<style>

html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0c0c0c;color:#f0ede8;overflow:hidden}

.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#c8a96e}

.city-wrap{display:flex;gap:4px;background:#1a1a1a;border-radius:8px;padding:3px}

.leaflet-tile-pane{filter:brightness(0.85) saturate(0.7) hue-rotate(180deg) invert(1) sepia(0.3)}
#panel{position:fixed;top:54px;right:0;width:300px;bottom:0;background:#111;border-left:1px solid #222;z-index:500;transform:translateX(100%);transition:transform .28s ease;overflow-y:auto;padding:1.5rem}
#panel.open{transform:translateX(0)}
.pclose{position:absolute;top:1rem;right:1rem;background:#1a1a1a;border:none;color:#555;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px}
.pcity{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.pname{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#f0ede8;margin-bottom:12px}
.plabel{font-size:11px;color:#444;margin-bottom:3px}
.pprice{font-family:'Syne',sans-serif;font-size:30px;font-weight:700;color:#c8a96e}
.punit{font-size:13px;color:#555}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.pbox{background:#1a1a1a;border-radius:8px;padding:10px}
.pboxl{font-size:10px;color:#444;margin-bottom:3px}
.pboxv{font-size:14px;color:#ddd;font-weight:500}
.psep{border-top:1px solid #222;margin:14px 0}
.psrc{font-size:10px;color:#333;line-height:1.5;margin-top:12px}
.psrclink{color:#c8a96e;cursor:pointer}

.ldot{width:8px;height:8px;border-radius:50%}
#sbox{position:fixed;bottom:1.5rem;left:1.5rem;background:rgba(12,12,12,0.9);border:1px solid #222;border-radius:8px;padding:10px 14px;z-index:500;font-size:12px;color:#555}
#sbox b{color:#ccc}
#sbox .stitle{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;color:#333}

#overlay.open{display:flex}
#modal{background:#111;border:1px solid #222;border-radius:14px;padding:1.75rem;width:100%;max-width:420px}
.mtitle{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.msub{font-size:12px;color:#555;margin-bottom:1.25rem;line-height:1.5}
.fg{margin-bottom:10px}
.fl{font-size:11px;color:#555;margin-bottom:4px;display:block}
.fi,.fs{width:100%;padding:9px 12px;background:#1a1a1a;border:1px solid #222;border-radius:8px;color:#f0ede8;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.fi:focus,.fs:focus{border-color:#c8a96e}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fbtn{width:100%;padding:11px;background:#c8a96e;border:none;border-radius:8px;color:#0c0c0c;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:4px}

  <div class="leg"><div class="ldot" style="background:#c8a96e"></div>Neuf</div>
</div>

<div id="panel">

  <div class="pcity" id="pc-city"></div>
  <div class="pname" id="pc-name"></div>
  <div class="plabel">Prix demandé médian</div>
  <div><span class="pprice" id="pc-price"></span><span class="punit"> DH/m²</span></div>
  <div class="pgrid" id="pc-grid"></div>
  <div id="pc-premium"></div>
  <div class="psrc" id="pc-src"></div>
</div>

<div id="overlay">

    <div id="form-inner">
      <div class="mtitle">Vous avez acheté récemment?</div>
      <div class="msub">Aidez-nous à construire la transparence du marché immobilier marocain. Données anonymisées.</div>

        <select class="fs" id="f-city" onchange="updateHoods()">
          <option>Casablanca</option><option>Tanger</option>
        </select></div>
      <div class="fg"><label class="fl">Quartier</label><select class="fs" id="f-hood"></select></div>
      <div class="frow">
        <div class="fg"><label class="fl">Prix payé (MAD)</label><input class="fi" type="number" id="f-price" placeholder="1 500 000"></div>
        <div class="fg"><label class="fl">Surface (m²)</label><input class="fi" type="number" id="f-surf" placeholder="95"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Type</label>
          <select class="fs" id="f-type"><option>Appartement</option><option>Villa</option><option>Terrain</option></select></div>
        <div class="fg"><label class="fl">Année</label>
          <select class="fs" id="f-year"><option>2025</option><option>2024</option><option>2023</option><option>2022</option></select></div>
      </div>

      <button class="fcancel" onclick="closeForm()">Annuler</button>
    </div>
  </div>
</div>

  {c:"Casablanca",n:"Gauthier (neuf)",med:30255,cnt:1,lat:33.5950,lng:-7.6320},

  {c:"Casablanca",n:"Oasis (neuf)",med:23528,cnt:3,lat:33.5620,lng:-7.6180},
];
const PREMIUM=[
  {n:"Triangle d'Or",resale:18561,newdev:37421,pct:101.6,v:"🔴 Very overpriced"},
  {n:"Gauthier",resale:18957,newdev:30255,pct:59.6,v:"🔴 Very overpriced"},
  {n:"Bourgogne",resale:19150,newdev:27940,pct:45.9,v:"🟠 Overpriced"},
  {n:"Oasis",resale:20290,newdev:23528,pct:16.0,v:"🟡 Slight premium"},
];

let map,markers=[],city='Casablanca';
function fmt(n){return Math.round(n).toLocaleString('fr-FR')}
function col(v,min,max){const t=(v-min)/(max-min||1);return t<0.33?'#4a9e6a':t<0.66?'#c8943a':'#c84a3a'}

const c=CENTERS[city];
map=L.map('map',{zoomControl:false}).setView([c.lat,c.lng],c.zoom);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap contributors',
  maxZoom:19
}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

function clearMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[]}

function renderMarkers(){
  clearMarkers();
  const d=DATA.filter(x=>x.c===city);
  if(!d.length)return;
  const meds=d.map(x=>x.med);
  const min=Math.min(...meds),max=Math.max(...meds);
  d.forEach(item=>{
    const color=col(item.med,min,max);
    const r=item.cnt>=50?22:item.cnt>=20?18:item.cnt>=8?14:10;
    const m=L.circleMarker([item.lat,item.lng],{radius:r,fillColor:color,fillOpacity:0.85,color:'#0c0c0c',weight:2}).addTo(map);
    m.on('click',()=>openPanel(item));
    m.on('mouseover',function(){this.setStyle({fillOpacity:1,weight:3})});
    m.on('mouseout',function(){this.setStyle({fillOpacity:0.85,weight:2})});
    markers.push(m);
  });
  NEWDEV.filter(x=>x.c===city).forEach(item=>{
    const m=L.circleMarker([item.lat,item.lng],{radius:10,fillColor:'#c8a96e',fillOpacity:0.9,color:'#0c0c0c',weight:2}).addTo(map);
    m.on('click',()=>openPanelNewdev(item));
    markers.push(m);
  });
  const total=d.reduce((s,x)=>s+x.cnt,0);
  const avg=Math.round(d.reduce((s,x)=>s+x.med,0)/d.length);
  document.getElementById('sb-city').textContent=city.toUpperCase();
  document.getElementById('sb-n').textContent=d.length;
  document.getElementById('sb-m').textContent=fmt(avg)+' DH/m²';
  document.getElementById('sb-a').textContent=total.toLocaleString('fr-FR');
}

renderMarkers();

function openPanel(d){
  const pr=PREMIUM.find(p=>p.n===d.n);
  document.getElementById('pc-city').textContent=d.c;
  document.getElementById('pc-name').textContent=d.n;
  document.getElementById('pc-price').textContent=fmt(d.med);
  document.getElementById('pc-grid').innerHTML=`
    <div class="pbox"><div class="pboxl">Annonces</div><div class="pboxv">${d.cnt}</div></div>
    <div class="pbox"><div class="pboxl">Moyenne</div><div class="pboxv">${fmt(d.avg)}</div></div>
    <div class="pbox"><div class="pboxl">p25</div><div class="pboxv">${fmt(d.p25)}</div></div>
    <div class="pbox"><div class="pboxl">p75</div><div class="pboxv">${fmt(d.p75)}</div></div>`;
  document.getElementById('pc-premium').innerHTML=pr?`
    <div class="psep"></div>
    <div style="background:#1a1a1a;border-radius:8px;padding:12px">
      <div style="font-size:10px;color:#444;text-transform:uppercase;margin-bottom:8px">Prime neuf vs revente</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#666;font-size:12px">${pr.v}</span>
        <span style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:${pr.pct>50?'#c84a3a':pr.pct>25?'#c8943a':'#c8a96e'}">${pr.pct>0?'+':''}${pr.pct}%</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;font-size:12px">
        <div><div style="color:#333;margin-bottom:2px">Revente</div><div style="color:#ccc">${fmt(pr.resale)} DH/m²</div></div>
        <div><div style="color:#333;margin-bottom:2px">Neuf</div><div style="color:#c8a96e">${fmt(pr.newdev)} DH/m²</div></div>
      </div>
    </div>`:'';
  document.getElementById('pc-src').innerHTML=`Sources: ${d.src}<br>Prix demandés · Données du 29 avril 2026<br><span class="psrclink" onclick="openForm()">Vous connaissez le vrai prix? →</span>`;
  document.getElementById('panel').classList.add('open');
}

function openPanelNewdev(d){
  document.getElementById('pc-city').textContent=d.c+' · Neuf';
  document.getElementById('pc-name').textContent=d.n;
  document.getElementById('pc-price').textContent=fmt(d.med);
  document.getElementById('pc-grid').innerHTML=`
    <div class="pbox"><div class="pboxl">Projets</div><div class="pboxv">${d.cnt}</div></div>
    <div class="pbox"><div class="pboxl">Source</div><div class="pboxv">Yakeey</div></div>`;
  document.getElementById('pc-premium').innerHTML='';
  document.getElementById('pc-src').textContent='Immobilier neuf · promoteurs';
  document.getElementById('panel').classList.add('open');
}

function closePanel(){document.getElementById('panel').classList.remove('open')}

function switchCity(c){
  city=c;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));
  const ctr=CENTERS[c];
  map.setView([ctr.lat,ctr.lng],ctr.zoom);
  closePanel();
  renderMarkers();
}

function updateHoods(){
  const c=document.getElementById('f-city').value;
  document.getElementById('f-hood').innerHTML=(HOODS[c]||[]).map(n=>`<option>${n}</option>`).join('');
}
function openForm(){updateHoods();document.getElementById('overlay').classList.add('open')}
function closeForm(){document.getElementById('overlay').classList.remove('open')}

async function submitForm(){
  const city=document.getElementById('f-city').value;
  const hood=document.getElementById('f-hood').value;
  const price=parseInt(document.getElementById('f-price').value);
  const surf=parseInt(document.getElementById('f-surf').value);
  const type=document.getElementById('f-type').value;
  const year=parseInt(document.getElementById('f-year').value);
  if(!price||!surf||price<100000||surf<10){alert('Veuillez remplir tous les champs.');return}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/sold_prices`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({city,neighborhood:hood,price_mad:price,surface_m2:surf,price_per_m2:Math.round(price/surf),type,year_sold:year,source:'Web form',verified:false,submitted_at:new Date().toISOString()})
    });
    if(r.status===201||r.status===200){
      document.getElementById('form-inner').innerHTML=`
        <div class="fsuccess">
          <div class="fsuccess-icon">✓</div>
          <div class="fsuccess-title">Merci!</div>
          <div class="fsuccess-text">Transaction enregistrée anonymement.<br>Vous aidez à construire la transparence du marché immobilier marocain.</div>
          <button class="fcancel" style="margin-top:1.25rem" onclick="closeForm()">Fermer</button>
        </div>`;
    }else{alert('Erreur. Réessayez.')}
  }catch(e){alert('Erreur de connexion.')}
}
</script>
