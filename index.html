<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TriqAqar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: sans-serif; }
#map { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }
header {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  background: #0c0c0c; display: flex; align-items: center;
  justify-content: space-between; padding: 0 1.5rem; z-index: 1000;
  border-bottom: 1px solid #222;
}
.logo { color: #c8a96e; font-size: 18px; font-weight: bold; }
.city-btn { padding: 5px 14px; border-radius: 6px; border: none; cursor: pointer; background: #222; color: #999; margin-left: 4px; }
.city-btn.active { background: #c8a96e; color: #000; font-weight: bold; }
#panel {
  position: fixed; top: 56px; right: 0; width: 300px; bottom: 0;
  background: #111; border-left: 1px solid #222; z-index: 500;
  transform: translateX(100%); transition: transform 0.3s; overflow-y: auto; padding: 1.5rem;
}
#panel.open { transform: translateX(0); }
#panel h2 { color: #c8a96e; font-size: 20px; margin-bottom: 4px; }
#panel .city-label { color: #555; font-size: 11px; text-transform: uppercase; margin-bottom: 12px; }
#panel .price { font-size: 28px; font-weight: bold; color: #fff; }
#panel .unit { font-size: 13px; color: #666; }
#panel .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
#panel .box { background: #1a1a1a; border-radius: 8px; padding: 10px; }
#panel .box-label { font-size: 10px; color: #555; margin-bottom: 3px; }
#panel .box-val { font-size: 14px; color: #ddd; font-weight: 500; }
#panel .close-btn { position: absolute; top: 1rem; right: 1rem; background: #222; border: none; color: #666; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; }
#legend {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: rgba(12,12,12,0.9); border: 1px solid #222; border-radius: 8px;
  padding: 8px 16px; display: flex; gap: 14px; font-size: 12px; color: #666; z-index: 500;
}
.leg { display: flex; align-items: center; gap: 5px; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
#statsbox {
  position: fixed; bottom: 1.5rem; left: 1.5rem;
  background: rgba(12,12,12,0.9); border: 1px solid #222; border-radius: 8px;
  padding: 10px 14px; z-index: 500; color: #666; font-size: 12px;
}
#statsbox b { color: #ddd; }
</style>
</head>
<body>

<header>
  <div class="logo">TriqAqar</div>
  <div>
    <button class="city-btn active" onclick="switchCity('Casablanca')">Casablanca</button>
    <button class="city-btn" onclick="switchCity('Tanger')">Tanger</button>
  </div>
</header>

<div id="map"></div>

<div id="statsbox">
  <div id="sb-city" style="font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Casablanca</div>
  <div>Quartiers: <b id="sb-n">—</b></div>
  <div>Médiane: <b id="sb-m">—</b></div>
  <div>Annonces: <b id="sb-a">—</b></div>
</div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#4a9e6a"></div>Abordable</div>
  <div class="leg"><div class="leg-dot" style="background:#c8943a"></div>Moyen</div>
  <div class="leg"><div class="leg-dot" style="background:#c84a3a"></div>Élevé</div>
  <div class="leg"><div class="leg-dot" style="background:#c8a96e"></div>Neuf</div>
</div>

<div id="panel">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <div class="city-label" id="pc-city"></div>
  <h2 id="pc-name"></h2>
  <div style="margin-top:8px">
    <div style="font-size:11px;color:#555;margin-bottom:3px">Prix demandé médian</div>
    <span class="price" id="pc-price"></span><span class="unit"> DH/m²</span>
  </div>
  <div class="grid" id="pc-grid"></div>
  <div id="pc-premium" style="margin-top:16px"></div>
  <div style="margin-top:16px;font-size:11px;color:#444;line-height:1.5" id="pc-sources"></div>
</div>

<script>
const DATA = [
  {city:"Casablanca",n:"Anfa",med:19509,p25:16212,p75:22222,avg:20173,min:12524,max:38710,cnt:118,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5889,lng:-7.6456},
  {city:"Casablanca",n:"Maarif",med:17421,p25:13876,p75:21420,avg:17650,min:10000,max:28000,cnt:88,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5731,lng:-7.6298},
  {city:"Casablanca",n:"Sidi Belyout",med:17593,p25:12515,p75:21555,avg:17835,min:3553,max:37576,cnt:70,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5989,lng:-7.6123},
  {city:"Casablanca",n:"Dar Bouazza",med:16147,p25:12274,p75:20506,avg:16721,min:7031,max:33113,cnt:79,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5234,lng:-7.7456},
  {city:"Casablanca",n:"Ain Chock",med:17800,p25:13725,p75:21081,avg:17850,min:10776,max:31063,cnt:61,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5445,lng:-7.5823},
  {city:"Casablanca",n:"Bouskoura",med:14743,p25:10125,p75:19538,avg:14916,min:6000,max:24455,cnt:54,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.4998,lng:-7.6421},
  {city:"Casablanca",n:"Californie",med:18333,p25:15793,p75:21615,avg:18675,min:9575,max:33113,cnt:47,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5756,lng:-7.6612},
  {city:"Casablanca",n:"Racine",med:19536,p25:16312,p75:22727,avg:20033,min:11026,max:43909,cnt:48,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5867,lng:-7.6356},
  {city:"Casablanca",n:"Ain Diab",med:19758,p25:13572,p75:22860,avg:19095,min:11000,max:29721,cnt:46,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5762,lng:-7.6598},
  {city:"Casablanca",n:"Hay Hassani",med:18886,p25:15784,p75:22456,avg:19081,min:9722,max:33113,cnt:48,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5534,lng:-7.6534},
  {city:"Casablanca",n:"Nouacer",med:18224,p25:11538,p75:22378,avg:17088,min:3857,max:33103,cnt:41,conf:"high",src:"Avito, Mubawab",lat:33.5023,lng:-7.5678},
  {city:"Casablanca",n:"Tamaris",med:19737,p25:14189,p75:22893,avg:19978,min:7755,max:44737,cnt:35,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5312,lng:-7.7123},
  {city:"Casablanca",n:"Oasis",med:20290,p25:15714,p75:22951,avg:19734,min:9722,max:33113,cnt:37,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5589,lng:-7.6234},
  {city:"Casablanca",n:"Gauthier",med:18957,p25:15907,p75:22613,avg:19648,min:11026,max:43909,cnt:38,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5923,lng:-7.6287},
  {city:"Casablanca",n:"Bourgogne",med:19150,p25:13957,p75:22613,avg:19156,min:11026,max:33113,cnt:34,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5912,lng:-7.6245},
  {city:"Casablanca",n:"Mers Sultan",med:18347,p25:13683,p75:22886,avg:18280,min:7755,max:33113,cnt:42,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5876,lng:-7.6187},
  {city:"Casablanca",n:"Ain Sebaa",med:18788,p25:12647,p75:23300,avg:20342,min:3700,max:54074,cnt:43,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.6123,lng:-7.5534},
  {city:"Casablanca",n:"Hay Mohammadi",med:18788,p25:13583,p75:22821,avg:18887,min:7000,max:33113,cnt:35,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5823,lng:-7.5712},
  {city:"Casablanca",n:"Roches Noires",med:18347,p25:11978,p75:21877,avg:17342,min:8504,max:26056,cnt:32,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.6023,lng:-7.5912},
  {city:"Casablanca",n:"Sidi Bernoussi",med:18516,p25:13771,p75:22886,avg:19211,min:8039,max:37449,cnt:34,conf:"high",src:"Avito, Mubawab, Sarouty",lat:33.5823,lng:-7.5312},
  {city:"Tanger",n:"Tanja Balia",med:18329,p25:12611,p75:34120,avg:25067,min:5893,max:67925,cnt:55,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7398,lng:-5.8623},
  {city:"Tanger",n:"Malabata",med:17178,p25:13666,p75:20889,avg:17684,min:5729,max:31573,cnt:43,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7923,lng:-5.7834},
  {city:"Tanger",n:"Moujahidine",med:16443,p25:11766,p75:19924,avg:16189,min:5450,max:31573,cnt:36,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7623,lng:-5.8512},
  {city:"Tanger",n:"Centre Ville",med:15184,p25:10860,p75:18246,avg:15774,min:5833,max:34000,cnt:58,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7712,lng:-5.8098},
  {city:"Tanger",n:"Marshan",med:15163,p25:10865,p75:18082,avg:15147,min:5893,max:31573,cnt:28,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7801,lng:-5.8187},
  {city:"Tanger",n:"California",med:15126,p25:11374,p75:18367,avg:15491,min:4875,max:31573,cnt:33,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7834,lng:-5.8423},
  {city:"Tanger",n:"Iberia",med:15126,p25:10367,p75:18348,avg:14783,min:5130,max:31573,cnt:31,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7589,lng:-5.8234},
  {city:"Tanger",n:"Route de Rabat",med:14500,p25:10735,p75:18367,avg:15323,min:7340,max:28421,cnt:37,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7234,lng:-5.8012},
  {city:"Tanger",n:"Boubana",med:14000,p25:10113,p75:18140,avg:13972,min:5208,max:25500,cnt:34,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7623,lng:-5.8156},
  {city:"Tanger",n:"Mesnana",med:13000,p25:11176,p75:17133,avg:14056,min:5450,max:25500,cnt:34,conf:"high",src:"Avito, Mubawab, Sarouty",lat:35.7312,lng:-5.8234},
];

const NEWDEV = [
  {city:"Casablanca",n:"Triangle d'Or",med:37421,cnt:1,lat:33.5845,lng:-7.6423},
  {city:"Casablanca",n:"Gauthier",med:30255,cnt:1,lat:33.5923,lng:-7.6320},
  {city:"Casablanca",n:"Bourgogne",med:27940,cnt:2,lat:33.5935,lng:-7.6245},
  {city:"Casablanca",n:"Oasis (neuf)",med:23528,cnt:3,lat:33.5620,lng:-7.6234},
];

const PREMIUM = [
  {n:"Triangle d'Or",resale:18561,newdev:37421,pct:101.6,v:"🔴 Very overpriced"},
  {n:"Gauthier",resale:18957,newdev:30255,pct:59.6,v:"🔴 Very overpriced"},
  {n:"Bourgogne",resale:19150,newdev:27940,pct:45.9,v:"🟠 Overpriced"},
  {n:"Oasis",resale:20290,newdev:23528,pct:16.0,v:"🟡 Slight premium"},
];

const CENTERS = {
  Casablanca: {lat:33.5731,lng:-7.5898,zoom:12},
  Tanger: {lat:35.7595,lng:-5.8340,zoom:13}
};

let map, markers=[], city='Casablanca';

function fmt(n){ return Math.round(n).toLocaleString('fr-FR'); }
function getColor(v,min,max){
  const t=(v-min)/(max-min||1);
  return t<0.33?'#4a9e6a':t<0.66?'#c8943a':'#c84a3a';
}

function initMap(){
  const c = CENTERS[city];
  map = new google.maps.Map(document.getElementById('map'),{
    center:{lat:c.lat,lng:c.lng}, zoom:c.zoom,
    mapId: 'DEMO_MAP_ID',
    disableDefaultUI:true,
    zoomControl:true,
    styles:[
      {elementType:"geometry",stylers:[{color:"#1a1a1a"}]},
      {elementType:"labels.text.fill",stylers:[{color:"#757575"}]},
      {elementType:"labels.text.stroke",stylers:[{color:"#212121"}]},
      {featureType:"road",elementType:"geometry",stylers:[{color:"#2c2c2c"}]},
      {featureType:"water",elementType:"geometry",stylers:[{color:"#000000"}]},
      {featureType:"poi",stylers:[{visibility:"off"}]},
      {featureType:"transit",stylers:[{visibility:"off"}]},
    ]
  });
  renderMarkers();
}

function clearMarkers(){
  markers.forEach(m=>m.setMap(null));
  markers=[];
}

function renderMarkers(){
  clearMarkers();
  const d = DATA.filter(d=>d.city===city);
  if(!d.length) return;
  const meds = d.map(x=>x.med);
  const min=Math.min(...meds), max=Math.max(...meds);

  d.forEach(item=>{
    const color = getColor(item.med,min,max);
    const size  = item.cnt>=50?22:item.cnt>=20?18:item.cnt>=8?14:10;
    const marker = new google.maps.Marker({
      position:{lat:item.lat,lng:item.lng}, map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:size,fillColor:color,fillOpacity:0.85,strokeColor:'#0a0a0a',strokeWeight:2},
      title:item.n, zIndex:item.cnt
    });
    marker.addListener('click',()=>openPanel(item));
    markers.push(marker);
  });

  NEWDEV.filter(d=>d.city===city).forEach(item=>{
    const m2 = new google.maps.Marker({
      position:{lat:item.lat+0.003,lng:item.lng+0.003}, map,
      icon:{path:'M 0,-1 L 0.7,0 L 0,1 L -0.7,0 Z',scale:11,fillColor:'#c8a96e',fillOpacity:0.9,strokeColor:'#0a0a0a',strokeWeight:1.5},
      title:item.n+' (Neuf)', zIndex:5
    });
    m2.addListener('click',()=>openPanelNewdev(item));
    markers.push(m2);
  });

  const total=d.reduce((s,x)=>s+x.cnt,0);
  const avg=Math.round(d.reduce((s,x)=>s+x.med,0)/d.length);
  document.getElementById('sb-city').textContent=city.toUpperCase();
  document.getElementById('sb-n').textContent=d.length;
  document.getElementById('sb-m').textContent=fmt(avg)+' DH/m²';
  document.getElementById('sb-a').textContent=total.toLocaleString('fr-FR');
}

function openPanel(d){
  const pr = PREMIUM.find(p=>p.n===d.n);
  document.getElementById('pc-city').textContent=d.city;
  document.getElementById('pc-name').textContent=d.n;
  document.getElementById('pc-price').textContent=fmt(d.med);
  document.getElementById('pc-grid').innerHTML=`
    <div class="box"><div class="box-label">Annonces</div><div class="box-val">${d.cnt}</div></div>
    <div class="box"><div class="box-label">Moyenne</div><div class="box-val">${fmt(d.avg)}</div></div>
    <div class="box"><div class="box-label">p25</div><div class="box-val">${fmt(d.p25)}</div></div>
    <div class="box"><div class="box-label">p75</div><div class="box-val">${fmt(d.p75)}</div></div>`;
  document.getElementById('pc-premium').innerHTML = pr ? `
    <div style="background:#1a1a1a;border-radius:8px;padding:12px">
      <div style="font-size:10px;color:#555;text-transform:uppercase;margin-bottom:8px">Prime neuf vs revente</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#999;font-size:13px">${pr.v}</span>
        <span style="font-size:20px;font-weight:bold;color:${pr.pct>50?'#c84a3a':pr.pct>25?'#c8943a':'#c8a96e'}">${pr.pct>0?'+':''}${pr.pct}%</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;font-size:12px">
        <div><div style="color:#444;margin-bottom:2px">Revente</div><div style="color:#ddd">${fmt(pr.resale)} DH/m²</div></div>
        <div><div style="color:#444;margin-bottom:2px">Neuf</div><div style="color:#c8a96e">${fmt(pr.newdev)} DH/m²</div></div>
      </div>
    </div>` : '';
  document.getElementById('pc-sources').textContent='Sources: '+d.src+' · Prix demandés · Données du 29 avril 2026';
  document.getElementById('panel').classList.add('open');
}

function openPanelNewdev(d){
  document.getElementById('pc-city').textContent=d.city+' · Neuf';
  document.getElementById('pc-name').textContent=d.n;
  document.getElementById('pc-price').textContent=fmt(d.med);
  document.getElementById('pc-grid').innerHTML=`
    <div class="box"><div class="box-label">Projets</div><div class="box-val">${d.cnt}</div></div>
    <div class="box"><div class="box-label">Source</div><div class="box-val">Yakeey</div></div>`;
  document.getElementById('pc-premium').innerHTML='';
  document.getElementById('pc-sources').textContent='Immobilier neuf · promoteurs';
  document.getElementById('panel').classList.add('open');
}

function closePanel(){ document.getElementById('panel').classList.remove('open'); }

function switchCity(c){
  city=c;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.toggle('active',b.textContent===c));
  const ctr=CENTERS[c];
  map.setCenter({lat:ctr.lat,lng:ctr.lng});
  map.setZoom(ctr.zoom);
  closePanel();
  renderMarkers();
}

window.initMap = initMap;
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKYoJ0UltB6zGrcwyRMo7KE0c-FSx7Qc0&callback=initMap&loading=async"></script>
</body>
</html>
